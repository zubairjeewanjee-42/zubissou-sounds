<?xml version="1.0" encoding="UTF-8"?>
<!-- DEEP SEARCH submersible — yellow Belafonte sub from the film, with the "Jacqueline / DEEP SEARCH"
     tattoo-style script on the hull. Two portholes, top conning observation bubble, twin pontoon
     stabilizers below, propeller at the stern, harpoon/light cone projecting forward. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" aria-label="Deep Search submersible">
  <!-- Light cone projecting forward -->
  <path d="M30 90 L0 70 L0 110 Z" fill="#ffef55" opacity="0.55"/>
  <path d="M28 90 L8 78 L8 102 Z" fill="#ffef55" opacity="0.7"/>

  <!-- Forward harpoon barrel -->
  <rect x="20" y="86" width="50" height="8" fill="#1a1a1a"/>
  <circle cx="22" cy="90" r="3" fill="#1a1a1a"/>

  <!-- Main yellow hull (rounded capsule) -->
  <path d="M60 60 Q80 50 130 50 L220 50 Q260 50 280 75 L300 95 Q280 120 230 120 L140 120 Q80 120 60 100 Q50 90 60 60 Z" fill="#ffef55" stroke="#1a1a1a" stroke-width="2"/>

  <!-- White lower stripe -->
  <path d="M70 100 Q90 110 140 112 L220 112 Q260 110 285 100 Q280 118 230 120 L140 120 Q80 120 70 100 Z" fill="#faf6ee" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Conning tower / observation bubble (top center) -->
  <rect x="155" y="20" width="60" height="35" fill="#ffef55" stroke="#1a1a1a" stroke-width="2" rx="3"/>
  <rect x="160" y="25" width="50" height="10" fill="#1a1a1a"/>
  <rect x="164" y="27" width="42" height="6" fill="#9be3f9"/>
  <circle cx="185" cy="50" r="3" fill="#1a1a1a"/>
  <line x1="185" y1="20" x2="185" y2="8" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="185" cy="8" r="2.5" fill="#f24f26"/>

  <!-- Twin large portholes (front + back of main hull) -->
  <circle cx="115" cy="85" r="20" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="115" cy="85" r="17" fill="#faf6ee" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="115" cy="85" r="14" fill="#c4d8e0" stroke="#1a1a1a" stroke-width="0.5"/>
  <circle cx="111" cy="81" r="3" fill="#faf6ee" opacity="0.85"/>
  <!-- porthole rivets -->
  <circle cx="115" cy="65" r="1.2" fill="#5a5a5a"/>
  <circle cx="135" cy="85" r="1.2" fill="#5a5a5a"/>
  <circle cx="115" cy="105" r="1.2" fill="#5a5a5a"/>
  <circle cx="95" cy="85" r="1.2" fill="#5a5a5a"/>

  <circle cx="185" cy="90" r="20" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="185" cy="90" r="17" fill="#faf6ee" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="185" cy="90" r="14" fill="#c4d8e0" stroke="#1a1a1a" stroke-width="0.5"/>
  <circle cx="181" cy="86" r="3" fill="#faf6ee" opacity="0.85"/>
  <circle cx="185" cy="70" r="1.2" fill="#5a5a5a"/>
  <circle cx="205" cy="90" r="1.2" fill="#5a5a5a"/>
  <circle cx="185" cy="110" r="1.2" fill="#5a5a5a"/>
  <circle cx="165" cy="90" r="1.2" fill="#5a5a5a"/>

  <!-- "Jacqueline" cursive script with strikethrough — Steve's tattoo of his ex's name -->
  <text x="230" y="95" font-family="'Brush Script MT', 'Lucida Handwriting', cursive" font-size="22" fill="#1a1a1a" font-style="italic">Jacqueline</text>
  <line x1="225" y1="91" x2="305" y2="91" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- "DEEP SEARCH" caps below -->
  <text x="230" y="115" font-family="Futura, 'Futura PT', 'Trebuchet MS', sans-serif" font-size="13" font-weight="900" fill="#1a1a1a" letter-spacing="1.5">DEEP SEARCH</text>

  <!-- Tail fin (vertical at stern, behind portholes) -->
  <path d="M280 75 L310 60 L310 130 L280 115 Z" fill="#ffef55" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Twin pontoon stabilizers below the hull -->
  <ellipse cx="135" cy="135" rx="50" ry="8" fill="#9eb0bc" stroke="#1a1a1a" stroke-width="1.5"/>
  <ellipse cx="220" cy="135" rx="50" ry="8" fill="#9eb0bc" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Struts connecting pontoons to hull -->
  <line x1="120" y1="120" x2="120" y2="130" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="155" y1="120" x2="155" y2="130" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="195" y1="120" x2="195" y2="130" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="240" y1="120" x2="240" y2="130" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Crosshair watermark (decorative — like the print version of the sub) -->
  <g stroke="#9eb0bc" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="0" x2="20" y2="20"/>
    <line x1="0" y1="20" x2="20" y2="0"/>
    <line x1="300" y1="160" x2="320" y2="180"/>
    <line x1="300" y1="180" x2="320" y2="160"/>
  </g>
</svg>
